serial_number: a200-1103
version: 0

system:
  username: administrator
  hosts:
    - hostname: cpr-a200-1103
      ip: 192.168.131.1
  ros2:
    namespace: a200_1103
    domain_id: 0
    middleware:
      implementation: rmw_fastrtps_cpp
    workspaces: 
      - "/home/rbt-roeun/clearpath_ws/install/setup.bash"

platform:
  controller: ps4
  battery:
    model: ES20_12C
    configuration: S2P1
  attachments:
    - name: front_bumper
      type: a200.bumper
      model: default
      parent: front_bumper_mount
      xyz: [0.0, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      enabled: true
      extension: 0.0
    - name: rear_bumper
      type: a200.bumper
      model: default
      parent: rear_bumper_mount
      xyz: [0.0, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      enabled: true
      extension: 0.0
    - name: top_plate
      type: a200.top_plate
      model: pacs
      parent: default_mount
      xyz: [0.0, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      enabled: true

  extras:
    urdf:
      package: hesai_lidar_description
      path: urdf/hesai_lidar.urdf.xacro
    launch:
      package: hesai_ros_driver
      path: launch/start.py

links:
  box:
    - name: user_bay_cover
      parent: top_plate_mount_b7
      xyz: [0.2, -0.16, 0.00735]
      rpy: [0.0, 0.0, 0.0]
      size: [0.4, 0.4, 0.002]
  cylinder: []
  frame: []
  mesh: []
  sphere: []
  
manipulators:
  arms:
    - model: kinova_gen3_lite
      parent: top_plate_link
      xyz: [0.0, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      ip: 192.168.131.40
      port: 10000
#      gripper:
#        model: kinova_2f_lite
        
mounts:
  bracket: []
  fath_pivot: []
  riser: []
  sick: []
  post: []
  disk: []

sensors:
  gps: []
  imu: []
  camera: []
  lidar2d: []
  lidar3d: []
