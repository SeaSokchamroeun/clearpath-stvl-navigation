# Unified Nav2 Configuration for Husky A200 with STVL
# Namespace: a200_1103 is applied by the launch file — do NOT prefix keys here

amcl:
  ros__parameters:
    use_sim_time: True

bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /a200_1103/platform/odom/filtered
    navigate_to_pose:
      bt_xml_filename: ""   # uses default
    navigate_through_poses:
      bt_xml_filename: ""
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node

controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      max_vel_x: 1.0
      max_vel_theta: 1.0
      acc_lim_x: 2.5
      acc_lim_theta: 3.2
      decel_lim_x: -2.5
      decel_lim_theta: -3.2
      critics:
        - "RotateToGoal"
        - "Oscillation"
        - "BaseObstacle"
        - "GoalAlign"
        - "PathAlign"
        - "PathDist"
        - "GoalDist"

# ─── LOCAL COSTMAP ───────────────────────────────────────────────────────────
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: True
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      update_frequency: 5.0
      publish_frequency: 2.0
      # static_layer first so STVL marks on top of it
      plugins: ["static_layer", "stvl_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      stvl_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: True
        publish_voxel_map: True        # set False after confirming it works
        voxel_decay: 5.0              # seconds — short for local reactivity
        decay_model: 0                # 0=linear, 1=exponential, -1=persistent
        voxel_size: 0.05             # 5cm, matches map resolution
        track_unknown_space: true
        unknown_threshold: 15
        mark_threshold: 0
        update_footprint_enabled: true
        combination_method: 1
        origin_z: 0.0
        transform_tolerance: 0.2
        mapping_mode: false
        observation_sources: lidar3d_source camera_source

        lidar3d_source:
          data_type: "PointCloud2"
          topic: "/a200_1103/sensors/lidar3d_0/points"
          marking: True
          clearing: True
          obstacle_max_range: 5.0
          obstacle_min_range: 0.5
          raytrace_max_range: 5.5
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0   # replaces your max_z
          min_obstacle_height: 0.05  # replaces your min_z — ignores ground
          model_type: 0              # 0 = spinning lidar frustum model
        camera_source:
          data_type: "PointCloud2"
          topic: "/a200_1103/sensors/camera_0/points"
          marking: True
          clearing: False
          obstacle_max_range: 3.0
          obstacle_min_range: 0.3
          raytrace_max_range: 3.5
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
          min_obstacle_height: 0.02
          model_type: 1       

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.55
        cost_scaling_factor: 10.0

# ─── GLOBAL COSTMAP ──────────────────────────────────────────────────────────
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: True
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.4
      resolution: 0.05
      update_frequency: 1.0
      publish_frequency: 1.0
      plugins: ["static_layer", "stvl_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      stvl_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: True
        publish_voxel_map: False       # not needed for global
        voxel_decay: 15.0             # longer persistence for planning
        decay_model: 0
        voxel_size: 0.05
        track_unknown_space: false    # less critical for global planner
        unknown_threshold: 15
        mark_threshold: 0
        update_footprint_enabled: true
        combination_method: 1
        origin_z: 0.0
        transform_tolerance: 0.2
        mapping_mode: false
        observation_sources: lidar3d_source

        lidar3d_source:
          data_type: "PointCloud2"
          topic: "/a200_1103/sensors/lidar3d_0/points"
          marking: True
          clearing: True
          obstacle_max_range: 8.0    # wider range for global awareness
          obstacle_min_range: 0.5
          raytrace_max_range: 8.5
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
          min_obstacle_height: 0.05
          model_type: 0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.55
        cost_scaling_factor: 3.0     # softer for global — lets planner find paths

# ─── OTHER SERVERS ───────────────────────────────────────────────────────────
planner_server:
  ros__parameters:
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"

behavior_server:
  ros__parameters:
    use_sim_time: True
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"

robot_state_publisher:
  ros__parameters:
    use_sim_time: True
    
    

