bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: True

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: True

controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.3
      yaw_goal_tolerance: 0.3
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 1.0
      max_vel_y: 0.0
      max_vel_theta: 1.0
      min_speed_xy: 0.0
      max_speed_xy: 1.0
      min_speed_theta: 0.0
      acc_lim_x: 0.5
      acc_lim_y: 0.0
      acc_lim_theta: 0.5
      decel_lim_x: -0.5
      decel_lim_y: 0.0
      decel_lim_theta: -0.5
      vx_samples: 20
      vy_samples: 5
      vtheta_samples: 20
      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: True
      stateful: True
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 12.0
      RotateToGoal.lookahead_time: -1.0

# ─── LOCAL COSTMAP ────────────────────────────────────────────────────────────
# Replaced voxel_layer with stvl_layer.
# STVL subscribes to lidar3d_0/points (VLP-16) and camera_0/points (RealSense).
# Topics use relative names (no /a200_1103/ prefix) — Nav2 applies the
# namespace automatically at runtime.
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.06
      footprint: "[ [0.55, 0.45], [0.55, -0.45], [-0.55, -0.45], [-0.55, 0.45] ]"
      plugins: ["static_layer", "stvl_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      stvl_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: True
        publish_voxel_map: True          # publishes /local_costmap/voxel_marked_cloud
        voxel_decay: 5.0                 # seconds — short decay for local reactivity
        decay_model: 0                   # 0=linear, 1=exponential, -1=persistent
        voxel_size: 0.05                 # 5 cm, finer than map resolution for detail
        track_unknown_space: true
        unknown_threshold: 15
        mark_threshold: 0
        update_footprint_enabled: true
        combination_method: 1            # 1=max
        origin_z: 0.0
        transform_tolerance: 0.5
        mapping_mode: false
        observation_sources: lidar3d_marking lidar3d_clearing

        # VLP-16: marks obstacles (adds them to costmap)
        lidar3d_marking:
          data_type: PointCloud2
          topic: /a200_1103/sensors/lidar3d_0/points   # relative — Nav2 prepends /a200_1103/
          marking: true
          clearing: false
          #min_obstacle_height: 0.1          # ignore ground returns below 10 cm
          #max_obstacle_height: 2.0
          #obstacle_max_range: 5.0
          #obstacle_min_range: 0.3
          # CORRECT - STVL parameter name
          obstacle_range: 5.0
          min_obstacle_height: 0.1
          max_obstacle_height: 2.0
          
          expected_update_rate: 0.0
          observation_persistence: 0.0
          inf_is_valid: false
          filter: "voxel"
          clear_after_reading: true

        # VLP-16: clears free space (removes stale voxels along ray)
        # Uses frustum model (model_type 1) for the spinning lidar FOV
        lidar3d_clearing:
          data_type: PointCloud2
          topic: /a200_1103/sensors/lidar3d_0/points   # same topic, different role
          marking: false
          clearing: true
          max_z: 8.0
          min_z: 0.1
          vertical_fov_angle: 0.2967        # VLP-16: ±15° = 30° total = 0.5236 rad half-angle
          vertical_fov_padding: 0.05
          horizontal_fov_angle: 6.2832      # 360° in radians
          decay_acceleration: 5.0
          model_type: 1                     # 1 = 3D spinning lidar frustum model

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0
        inflation_radius: 0.8

      always_send_full_costmap: True

# ─── GLOBAL COSTMAP ───────────────────────────────────────────────────────────
# Replaced obstacle_layer with stvl_layer.
# Longer voxel_decay for global planning awareness.
# publish_voxel_map off — not needed for global planner.
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True
      footprint: "[ [0.55, 0.45], [0.55, -0.45], [-0.55, -0.45], [-0.55, 0.45] ]"
      resolution: 0.06
      track_unknown_space: true
      plugins: ["static_layer", "stvl_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      stvl_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: True
        publish_voxel_map: False         # not needed for global planner
        voxel_decay: 15.0               # longer persistence for global planning
        decay_model: 0
        voxel_size: 0.05
        track_unknown_space: false
        unknown_threshold: 15
        mark_threshold: 0
        update_footprint_enabled: true
        combination_method: 1
        origin_z: 0.0
        transform_tolerance: 0.5
        mapping_mode: false
        observation_sources: lidar3d_marking lidar3d_clearing

        lidar3d_marking:
          data_type: PointCloud2
          topic: /a200_1103/sensors/lidar3d_0/points
          marking: true
          clearing: false
          min_obstacle_height: 0.1
          max_obstacle_height: 2.0
          #obstacle_max_range: 8.0        # wider range for global awareness
          #obstacle_min_range: 0.3
          
          obstacle_range: 8.0

          expected_update_rate: 0.0
          observation_persistence: 0.0
          inf_is_valid: false
          filter: "voxel"
          clear_after_reading: true

        lidar3d_clearing:
          data_type: PointCloud2
          topic: /a200_1103/sensors/lidar3d_0/points
          marking: false
          clearing: true
          max_z: 8.0
          min_z: 0.1
          vertical_fov_angle: 0.2967
          vertical_fov_padding: 0.05
          horizontal_fov_angle: 6.2832
          decay_acceleration: 5.0
          model_type: 1

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0
        inflation_radius: 0.8

      always_send_full_costmap: True

# ─── OTHER SERVERS (unchanged from Clearpath default) ─────────────────────────
planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: True
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: true
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.2
    rotational_acc_lim: 0.5

robot_state_publisher:
  ros__parameters:
    use_sim_time: True

waypoint_follower:
  ros__parameters:
    use_sim_time: True
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: True
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [1.0, 0.0, 1.0]
    min_velocity: [-1.0, 0.0, -1.0]
    max_accel: [0.5, 0.0, 0.5]
    max_decel: [-0.5, 0.0, -0.5]
    odom_topic: "platform/odom/filtered"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
